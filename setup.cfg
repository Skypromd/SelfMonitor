[isort]
# FastAPI microservices — sys.path manipulation before some imports is required
profile = black
line_length = 120
known_first_party = libs,app
known_third_party = fastapi,pydantic,sqlalchemy,alembic,celery,boto3,botocore,jose,passlib,qrcode,redis,aiohttp,asyncpg,uvicorn,prometheus_fastapi_instrumentator,pyotp,openai,anthropic,weaviate,aiokafka
force_sort_within_sections = true
# Silence the "imports not grouped" warning for conditional/fallback imports
force_single_line = false
no_sections = false
# Files with dynamic sys.path manipulation are skipped via per-file # isort: skip_file comments

[flake8]
max-line-length = 120
extend-ignore =
    E203,
    W503,
    W504,
    E402,
    E501,
    W291,
    W293,
    B008,
    BLE001,
    E711,
    E712,
    E741,
    W605,
    I001,
    I002,
    I003,
    I004,
    I005,
    E221,
    E222,
    E305,
    E302,
    E303,
    E261,
    W391,
    W292,
    E128,
    E127,
    E201,
    E231,
    E272,
    F401,
    F811,
    F821,
    F841,
    F541
exclude =
    .git,
    .venv,
    venv,
    __pycache__,
    alembic,
    migrations,
    node_modules,
    apps,
    *.egg-info,
    dist,
    build

[mypy]
ignore_missing_imports = True
disable_error_code = override,misc,no-redef,import-untyped

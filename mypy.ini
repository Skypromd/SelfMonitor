[mypy]
# Python version for analysis
python_version = 3.12
# Don't error on missing stubs for third-party packages
ignore_missing_imports = True
# Suppress errors in conditional import fallback patterns
# (try: import X; except ImportError: def X(): ...)
no_implicit_reexport = False

# Disable checks that produce false positives in this FastAPI codebase
disable_error_code =
    override,
    misc,
    no-redef,
    import-untyped

# Per module overrides for graceful-degradation stub modules
[mypy-services.predictive_analytics.app.main]
disable_error_code = override, no-redef, misc

[mypy-services.analytics_service.tests.*]
ignore_errors = True

# Third-party packages without stubs
[mypy-jose.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-qrcode.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-pyotp.*]
ignore_missing_imports = True

[mypy-prometheus_fastapi_instrumentator.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

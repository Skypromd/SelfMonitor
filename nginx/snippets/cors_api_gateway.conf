# Browser preflight + CORS for SPA (e.g. localhost:3000, practolog.localhost:3000 → gateway :8000).
# Requires $cors_origin: use `map $http_origin $cors_origin { ... }` in http {} (see nginx.conf).
# Include before proxy_hide_upstream_cors + proxy_common + proxy_pass.

if ($request_method = 'OPTIONS') {
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-Id' always;
    add_header 'Access-Control-Max-Age' 86400 always;
    return 204;
}

add_header 'Access-Control-Allow-Origin' $cors_origin always;
add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Request-Id' always;

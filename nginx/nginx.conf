worker_processes 1;

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_global_per_ip:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=5r/s;
    # Stricter cap for API key → JWT exchange (brute-force / abuse).
    limit_req_zone $binary_remote_addr zone=api_key_exchange_per_ip:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    map $http_x_request_id $correlation_request_id {
        ""      $request_id;
        default $http_x_request_id;
    }

    map $http_user_agent $waf_block_bad_ua {
        default 0;
        "~*(sqlmap|nikto|acunetix|nmap|masscan|wpscan)" 1;
    }

    map $request_uri $waf_block_bad_uri {
        default 0;
        "~*(\\.\\./|%2e%2e%2f|<script|%3cscript|union(?:\\+|%20)select|/\\.git|/\\.env|/wp-admin|/phpmyadmin)" 1;
    }

    map "$waf_block_bad_ua:$waf_block_bad_uri" $waf_block_reason {
        default "none";
        "1:0" "bad_user_agent_signature";
        "0:1" "bad_uri_signature";
        "1:1" "bad_user_agent_and_uri_signature";
    }

    log_format waf_json escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$correlation_request_id",'
            '"waf_bad_ua":$waf_block_bad_ua,'
            '"waf_bad_uri":$waf_block_bad_uri,'
            '"waf_block_reason":"$waf_block_reason"'
        '}';

    # Docker embedded DNS; variable proxy_pass below resolves at request time so missing containers do not block startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA origins allowed to read API responses (dev: localhost + *.localhost e.g. practolog.localhost).
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https?://[a-z0-9.-]+\\.localhost(:[0-9]+)?$" $http_origin;
        "~^https?://127\\.0\\.0\\.1(:[0-9]+)?$" $http_origin;
        "~^https?://192\\.168\\.[0-9]{1,3}\\.[0-9]{1,3}(:[0-9]+)?$" $http_origin;
        "~^https?://10\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}(:[0-9]+)?$" $http_origin;
        "~^https?://172\\.(1[6-9]|2[0-9]|3[01])\\.[0-9]{1,3}\\.[0-9]{1,3}(:[0-9]+)?$" $http_origin;
    }

    # Main server block for handling all traffic on port 80
    server {
        listen 80;
        server_tokens off;
        client_max_body_size 12m;
        access_log /dev/stdout waf_json;
        error_log /dev/stderr warn;

        limit_conn per_ip_conn 30;
        limit_req zone=api_global_per_ip burst=120 nodelay;
        limit_req_status 429;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Request-Id $correlation_request_id always;

        # CORS: $cors_origin from map (http block)

        # Health check
        location /health {
            return 200 'API Gateway is running';
        }

        if ($waf_block_bad_ua) {
            return 403;
        }

        if ($waf_block_bad_uri) {
            return 403;
        }

        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
            return 405;
        }

        location = /api/auth/token {
            limit_req zone=auth_per_ip burst=12 nodelay;
            set $api_upstream auth-service:80;
            rewrite /api/auth/(.*) /$1 break;
            include /etc/nginx/snippets/proxy_common.conf;
            proxy_pass http://$api_upstream;
        }

        location = /api/auth/register {
            limit_req zone=auth_per_ip burst=8 nodelay;
            set $api_upstream auth-service:80;
            rewrite /api/auth/(.*) /$1 break;
            include /etc/nginx/snippets/proxy_common.conf;
            proxy_pass http://$api_upstream;
        }

        location = /api/auth/token/api-key {
            limit_req zone=api_key_exchange_per_ip burst=3 nodelay;
            set $api_upstream auth-service:80;
            rewrite /api/auth/(.*) /$1 break;
            include /etc/nginx/snippets/proxy_common.conf;
            proxy_pass http://$api_upstream;
        }

        # Rule for auth-service
        location /api/auth/ {
            limit_req zone=auth_per_ip burst=10 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

            set $api_upstream auth-service:80;
            rewrite /api/auth/(.*) /$1 break;
            include /etc/nginx/snippets/proxy_hide_upstream_cors.conf;
            include /etc/nginx/snippets/proxy_common.conf;
            proxy_pass http://$api_upstream;
        }

        # Rule for user-profile-service
        location /api/profile/ {
            limit_req zone=api_global_per_ip burst=20 nodelay;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

            set $api_upstream user-profile-service:80;
            rewrite /api/profile/(.*) /$1 break;
            include /etc/nginx/snippets/proxy_hide_upstream_cors.conf;
            include /etc/nginx/snippets/proxy_common.conf;
            proxy_pass http://$api_upstream;
        }

        # API routes — CORS for browser preflight (OPTIONS); same pattern as /api/auth/ and /api/profile/
        location /api/transactions/ {
            include /etc/nginx/snippets/cors_api_gateway.conf;
            set $api_upstream transactions-service:80;
            rewrite /api/transactions/(.*) /$1 break;
            include /etc/nginx/snippets/proxy_hide_upstream_cors.conf;
            include /etc/nginx/snippets/proxy_common.conf;
            proxy_pass http://$api_upstream;
        }
        location /api/compliance/ {

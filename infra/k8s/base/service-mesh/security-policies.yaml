apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: selfmonitor
spec:
  mtls:
    mode: STRICT

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: deny-all-default
  namespace: selfmonitor
spec:
  {}

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: selfmonitor
spec:
  selector:
    matchLabels:
      app: nginx-gateway
  rules:
    - from:
        - source:
            namespaces: ["istio-system"]

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-inter-service
  namespace: selfmonitor
spec:
  rules:
    - from:
        - source:
            namespaces: ["selfmonitor"]
    - to:
        - operation:
            paths: ["/health", "/metrics"]

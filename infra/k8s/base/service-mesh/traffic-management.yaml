apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: selfmonitor-default-dr
  namespace: selfmonitor
spec:
  host: "*.selfmonitor.svc.cluster.local"
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    tls:
      mode: ISTIO_MUTUAL

---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: auth-service-vs
  namespace: selfmonitor
spec:
  hosts:
    - auth-service
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: auth-service
            port:
              number: 80

---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: transactions-service-vs
  namespace: selfmonitor
spec:
  hosts:
    - transactions-service
  http:
    - timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      route:
        - destination:
            host: transactions-service
            port:
              number: 80

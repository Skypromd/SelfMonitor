apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-gateway-deployment
  namespace: selfmonitor
  labels:
    app: graphql-gateway
    component: gateway
    version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: graphql-gateway
      component: gateway
  template:
    metadata:
      labels:
        app: graphql-gateway
        component: gateway
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: graphql-gateway
          image: selfmonitor/graphql-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: graphql
          env:
            - name: PORT
              value: "4000"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service"
            - name: TRANSACTIONS_SERVICE_URL
              value: "http://transactions-service"
            - name: USER_PROFILE_SERVICE_URL
              value: "http://user-profile-service"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /.well-known/apollo/server-health
              port: 4000
            initialDelaySeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /.well-known/apollo/server-health
              port: 4000
            initialDelaySeconds: 5
            timeoutSeconds: 1

---
apiVersion: v1
kind: Service
metadata:
  name: graphql-gateway
  namespace: selfmonitor
  labels:
    app: graphql-gateway
    component: gateway
spec:
  type: ClusterIP
  ports:
    - name: graphql
      port: 4000
      targetPort: 4000
  selector:
    app: graphql-gateway
    component: gateway

apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-connector-deployment
  namespace: selfmonitor
  labels:
    app: banking-connector
    component: integration
    version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: banking-connector
      component: integration
  template:
    metadata:
      labels:
        app: banking-connector
        component: integration
        version: "1.0.0"
        type: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: banking-connector
        image: selfmonitor/banking-connector:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: AUTH_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-secret
              key: AUTH_SECRET_KEY
        - name: TRANSACTIONS_SERVICE_URL
          value: "http://transactions-service/import"
        - name: VAULT_ADDR
          valueFrom:
            secretKeyRef:
              name: banking-secret
              key: VAULT_ADDR
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: banking-secret
              key: VAULT_TOKEN
        - name: REDIS_URL
          value: "redis://redis-service:6379/3"
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          timeoutSeconds: 1

---
apiVersion: v1
kind: Service
metadata:
  name: banking-connector
  namespace: selfmonitor
  labels:
    app: banking-connector
    component: integration
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: banking-connector
    component: integration

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtd-agent-deployment
  namespace: selfmonitor
  labels:
    app: mtd-agent
    component: compliance
    version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: mtd-agent
      component: compliance
  template:
    metadata:
      labels:
        app: mtd-agent
        component: compliance
        version: "1.0.0"
        type: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: mtd-agent
        image: selfmonitor/mtd-agent:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: AUTH_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-secret
              key: AUTH_SECRET_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: OPENAI_API_KEY
        - name: HMRC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: hmrc-secret
              key: HMRC_OAUTH_CLIENT_ID
        - name: HMRC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: hmrc-secret
              key: HMRC_OAUTH_CLIENT_SECRET
        - name: TAX_ENGINE_URL
          value: "http://tax-engine"
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          timeoutSeconds: 1

---
apiVersion: v1
kind: Service
metadata:
  name: mtd-agent
  namespace: selfmonitor
  labels:
    app: mtd-agent
    component: compliance
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: mtd-agent
    component: compliance

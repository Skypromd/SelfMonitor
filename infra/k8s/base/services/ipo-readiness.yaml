apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipo-readiness-deployment
  namespace: selfmonitor
  labels:
    app: ipo-readiness
    component: business
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ipo-readiness
      component: business
  template:
    metadata:
      labels:
        app: ipo-readiness
        component: business
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: ipo-readiness
          image: selfmonitor/ipo-readiness:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: AUTH_SECRET_KEY
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            timeoutSeconds: 1

---
apiVersion: v1
kind: Service
metadata:
  name: ipo-readiness
  namespace: selfmonitor
  labels:
    app: ipo-readiness
    component: business
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: ipo-readiness
    component: business

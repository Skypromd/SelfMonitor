apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service-deployment
  namespace: selfmonitor
  labels:
    app: security-service
    component: security
    version: "1.0.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: security-service
      component: security
  template:
    metadata:
      labels:
        app: security-service
        component: security
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: security-service
          image: selfmonitor/security-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: AUTH_SECRET_KEY
            - name: REDIS_URL
              value: "redis://redis-service:6379/6"
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            timeoutSeconds: 1

---
apiVersion: v1
kind: Service
metadata:
  name: security-service
  namespace: selfmonitor
  labels:
    app: security-service
    component: security
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: security-service
    component: security

services:
  # Federation requires real GraphQL subgraphs; most REST services have no /graphql yet.
  # Start with: docker compose --profile graphql up -d graphql-gateway
  graphql-gateway:
    profiles:
      - graphql
    build: ./services/graphql-gateway
    container_name: graphql-gateway
    environment:
      NODE_ENV: development
      PORT: 4000
      JWT_SECRET: "${GRAPHQL_JWT_SECRET:-${AUTH_SECRET_KEY}}"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
      # Service URLs for federation
      AUTH_SERVICE_URL: "http://auth-service:80/graphql"
      USER_PROFILE_SERVICE_URL: "http://user-profile-service:80/graphql"
      TRANSACTIONS_SERVICE_URL: "http://transactions-service:80/graphql"
      ANALYTICS_SERVICE_URL: "http://analytics-service:80/graphql"
      ADVICE_SERVICE_URL: "http://advice-service:80/graphql"
      CATEGORIZATION_SERVICE_URL: "http://categorization-service:80/graphql"
      BANKING_CONNECTOR_URL: "http://banking-connector:80/graphql"
      COMPLIANCE_SERVICE_URL: "http://compliance-service:80/graphql"
      DOCUMENTS_SERVICE_URL: "http://documents-service:80/graphql"
      CALENDAR_SERVICE_URL: "http://calendar-service:80/graphql"
      AI_AGENT_SERVICE_URL: "http://ai-agent-service:80/graphql"
      RECOMMENDATION_ENGINE_URL: "http://recommendation-engine:80/graphql"
      FRAUD_DETECTION_SERVICE_URL: "http://fraud-detection-service:80/graphql"
      BUSINESS_INTELLIGENCE_URL: "http://business-intelligence:80/graphql"
      CUSTOMER_SUCCESS_URL: "http://customer-success-platform:80/graphql"
      PRICING_ENGINE_URL: "http://pricing-engine:80/graphql"
      INTEGRATIONS_SERVICE_URL: "http://integrations-service:80/graphql"
      PARTNER_REGISTRY_URL: "http://partner-registry:80/graphql"
      PAYMENT_GATEWAY_URL: "http://payment-gateway:80/graphql"
      LOCALIZATION_SERVICE_URL: "http://localization-service:80/graphql"
      CONSENT_SERVICE_URL: "http://consent-service:80/graphql"
      TAX_ENGINE_URL: "http://tax-engine:80/graphql"
      QNA_SERVICE_URL: "http://qna-service:80/graphql"
      JAEGER_ENDPOINT: "http://jaeger-collector:14268/api/traces"
    ports:
      - "4000:4000" # GraphQL Federation Gateway endpoint
    depends_on:
      - postgres-master
      - auth-service
      - user-profile-service
      - transactions-service
      - analytics-service
      - advice-service
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - default_network

  nginx-gateway:
    build: ./nginx
    container_name: nginx-gateway
    ports:
      - "8000:80" # The single entry point for our backend
    # Только контур v1 (см. docs/production-scope.md). Остальные сервисы поднимаются своими зависимостями;
    # nginx резолвит upstream при запросе (без жёсткой блокировки старта на «весь зоопарк»).
    depends_on:
      - auth-service
      - user-profile-service
      - transactions-service
      - banking-connector
      - documents-service
      - tax-engine
      - integrations-service
      - mtd-agent
      - invoice-service
      - billing-service
      - localization-service
    networks:
      - default_network

  # PostgreSQL High Availability Master-Replica Setup
  postgres-master:
    image: postgres:15-alpine
    container_name: postgres_master
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-db_user_profile}"
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./infra/postgres/docker-init:/docker-entrypoint-initdb.d:ro
    networks:
      - default_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  postgres-replica:
    profiles:
      - ha-postgres
    image: postgres:15-alpine
    container_name: postgres_replica
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-db_user_profile}"
      PGUSER: "${POSTGRES_USER:-user}"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    depends_on:
      - postgres-master
    command: >
      bash -c "
      until pg_basebackup -h postgres-master -D /var/lib/postgresql/data -U replicator -v -P -W; do
        echo 'Waiting for master to be available...'
        sleep 1
      done
      echo 'Standby ready, starting replica'
      postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    networks:
      - default_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\""]
      interval: 10s
      timeout: 5s
      retries: 3

  # MLOps Platform Services
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      # Для prod задайте в .env / секретах; локальный дефолт только для удобства dev.
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    ports:
      - "9000:9000" # MinIO API
      - "9001:9001" # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - default_network

  # Redis High Availability Cluster with Sentinel
  redis-master:
    image: redis:7-alpine
    container_name: redis_master
    volumes:
      - redis_master_data:/data
      - ./infra/redis/redis-master.conf:/usr/local/etc/redis/redis.conf
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server /usr/local/etc/redis/redis.conf
        fi
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-replica-1:
    profiles:
      - redis-ha
    image: redis:7-alpine
    container_name: redis_replica_1
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    ports:
      - "6380:6379"
    volumes:
      - redis_replica1_data:/data
      - ./infra/redis/redis-replica.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    depends_on:
      - redis-master
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-replica-2:
    profiles:
      - redis-ha
    image: redis:7-alpine
    container_name: redis_replica_2
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    ports:
      - "6381:6379"
    volumes:
      - redis_replica2_data:/data
      - ./infra/redis/redis-replica.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    depends_on:
      - redis-master
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis Sentinels for automatic failover
  redis-sentinel-1:
    profiles:
      - redis-ha
    image: redis:7-alpine
    container_name: redis_sentinel_1
    ports:
      - "26379:26379"
    volumes:
      - ./infra/redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
    networks:
      - default_network

  redis-sentinel-2:
    profiles:
      - redis-ha
    image: redis:7-alpine
    container_name: redis_sentinel_2
    ports:
      - "26380:26379"
    volumes:
      - ./infra/redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
    networks:
      - default_network

  redis-sentinel-3:
    profiles:
      - redis-ha
    image: redis:7-alpine
    container_name: redis_sentinel_3
    ports:
      - "26381:26379"
    volumes:
      - ./infra/redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    depends_on:
      - redis-master
    networks:
      - default_network

  mlflow-server:
    profiles:
      - mlops
    build: ./ml/mlops-platform
    container_name: mlflow-server
    depends_on:
      - postgres-master
      - minio
      - redis-master
    environment:
      # MLflow Configuration
      MLFLOW_TRACKING_URI: "postgresql://user:${POSTGRES_PASSWORD}@postgres-master:5432/mlflow"
      ARTIFACT_STORE: "minio"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      S3_BUCKET_NAME: "mynettax-ml-artifacts"

      # Database Configuration
      DB_HOST: "postgres-master"
      DB_NAME: "mlflow"
      DB_USER: "user"
      DB_PASSWORD: "${POSTGRES_PASSWORD}"

      # Redis Configuration
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"

      # Environment
      ENVIRONMENT: "development"
      DEBUG: "true"
      LOG_LEVEL: "INFO"

      # Notification (development - no real webhooks)
      SLACK_WEBHOOK_URL: ""

      # Model Configuration
      MAX_PARALLEL_TRAINING_JOBS: "2"
      AUTO_PROMOTE_THRESHOLD: "0.8" # Lower for development
      DRIFT_DETECTION_ENABLED: "true"
      PERFORMANCE_MONITORING_ENABLED: "true"
      AB_TESTING_ENABLED: "true"
    ports:
      - "5000:5000" # MLflow UI
      - "8100:8000" # Metrics endpoint (remapped to avoid conflict with nginx-gateway)
    volumes:
      - mlflow_artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default_network

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    depends_on:
      - redis
    environment:
      # This is how we pass secrets to our services in a production-like environment.
      # In a real cloud deployment, this would come from a secret manager (like AWS Secrets Manager or HashiCorp Vault).
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      AUTH_RUNTIME_STATE_BACKEND: "${AUTH_RUNTIME_STATE_BACKEND:-redis}"
      AUTH_RUNTIME_STATE_REDIS_URL: "${AUTH_RUNTIME_STATE_REDIS_URL:-redis://redis:6379/1}"
      AUTH_RUNTIME_STATE_REDIS_KEY: "${AUTH_RUNTIME_STATE_REDIS_KEY:-mynettax:auth:runtime_state}"
      AUTH_RUNTIME_STATE_REDIS_TIMEOUT_SECONDS: "${AUTH_RUNTIME_STATE_REDIS_TIMEOUT_SECONDS:-0.5}"
      AUTH_RUNTIME_REDIS_SEGMENTED_ENABLED: "${AUTH_RUNTIME_REDIS_SEGMENTED_ENABLED:-true}"
      AUTH_RUNTIME_RETENTION_EVENTS_DAYS: "${AUTH_RUNTIME_RETENTION_EVENTS_DAYS:-30}"
      AUTH_RUNTIME_RETENTION_DISPATCH_DAYS: "${AUTH_RUNTIME_RETENTION_DISPATCH_DAYS:-30}"
      AUTH_RUNTIME_RETENTION_DELIVERIES_DAYS: "${AUTH_RUNTIME_RETENTION_DELIVERIES_DAYS:-30}"
      AUTH_RUNTIME_RETENTION_PUSH_REVOKED_DAYS: "${AUTH_RUNTIME_RETENTION_PUSH_REVOKED_DAYS:-90}"
      AUTH_RUNTIME_RETENTION_REFRESH_REVOKED_DAYS: "${AUTH_RUNTIME_RETENTION_REFRESH_REVOKED_DAYS:-30}"
      AUTH_RUNTIME_CLEANUP_ENABLED: "${AUTH_RUNTIME_CLEANUP_ENABLED:-true}"
      AUTH_RUNTIME_CLEANUP_INTERVAL_SECONDS: "${AUTH_RUNTIME_CLEANUP_INTERVAL_SECONDS:-300}"
      AUTH_DB_PATH: "/data/auth.db"
      # Локальная разработка: задайте в корневом .env (см. .env.example)
      AUTH_BOOTSTRAP_ADMIN: "${AUTH_BOOTSTRAP_ADMIN:-false}"
      AUTH_ADMIN_EMAIL: "${AUTH_ADMIN_EMAIL:-admin@example.com}"
      AUTH_ADMIN_PASSWORD: "${AUTH_ADMIN_PASSWORD:-admin_password}"
      AUTH_REQUIRE_ADMIN_2FA: "${AUTH_REQUIRE_ADMIN_2FA:-true}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:3000}"
      AUTH_CORS_EXTRA_ORIGINS: "${AUTH_CORS_EXTRA_ORIGINS:-http://practolog.localhost:3000}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-internal-service-secret-dev-replace}"
    volumes:
      - auth_service_data:/data
    # ports are no longer exposed directly
    networks:
      - default_network

  # === INVOICE SERVICE ===
  invoice-service:
    build: ./services/invoice-service
    container_name: invoice-service
    environment:
      DATABASE_URL: "postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master:5432/db_invoices"
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_INVOICE_WEBHOOK_SECRET: "${STRIPE_INVOICE_WEBHOOK_SECRET:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      PDF_OUTPUT_DIR: /app/pdfs
      REDIS_URL: "${INVOICE_REDIS_URL:-redis://redis-master:6379/0}"
      TRANSACTIONS_SERVICE_URL: http://transactions-service:80
      ANALYTICS_SERVICE_URL: http://analytics-service:80
    volumes:
      - invoice_pdfs:/app/pdfs
      - ./services/invoice-service/templates:/app/templates
    ports:
      - "8005:80" # Direct access for development/testing
    depends_on:
      - postgres-master
      - redis-master
      - auth-service
    command: sh -c "poetry run alembic upgrade head && poetry run uvicorn app.main:app --host 0.0.0.0 --port 80"
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  user-profile-service:
    build:
      context: .
      dockerfile: services/user-profile-service/Dockerfile
    container_name: user-profile-service
    depends_on:
      - postgres-master
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      DATABASE_URL: "${USER_PROFILE_DATABASE_URL:-postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master/db_user_profile}"
    # Run migrations before starting the app server
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 80"
    networks:
      - default_network

  transactions-service:
    build:
      context: .
      dockerfile: services/transactions-service/Dockerfile
    container_name: transactions-service
    depends_on:
      - postgres-master
      - categorization-service
      - compliance-service
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-internal-service-secret-dev-replace}"
      INTERNAL_ALLOWED_ISSUERS: "${INTERNAL_ALLOWED_ISSUERS:-documents-service}"
      INTERNAL_JWT_AUDIENCE: "${INTERNAL_JWT_AUDIENCE:-mynettax-internal}"
      DATABASE_URL: "${TRANSACTIONS_DATABASE_URL:-postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master/db_transactions}"
      CATEGORIZATION_SERVICE_URL: "${CATEGORIZATION_SERVICE_URL:-http://categorization-service/categorize}"
      COMPLIANCE_SERVICE_URL: "${TRANSACTIONS_COMPLIANCE_SERVICE_URL:-http://compliance-service:80}"
      # Kafka producer not wired on app; keep off unless emit_event + broker are implemented
      KAFKA_ENABLED: "${KAFKA_ENABLED:-false}"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 80"
    networks:
      - default_network

  compliance-service:
    build: ./services/compliance-service
    container_name: compliance-service
    depends_on:
      - postgres-master
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      DATABASE_URL: "${COMPLIANCE_DATABASE_URL:-postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master/db_compliance}"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 80"
    networks:
      - default_network

  consent-service:
    build:
      context: .
      dockerfile: services/consent-service/Dockerfile
    container_name: consent-service
    depends_on:
      - compliance-service
      - postgres-master
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      DATABASE_URL: "${CONSENT_DATABASE_URL:-postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master/db_consent}"
      COMPLIANCE_SERVICE_URL: "${CONSENT_COMPLIANCE_SERVICE_URL:-http://compliance-service/audit-events}"
    networks:
      - default_network

  banking-connector:
    build:
      context: .
      dockerfile: services/banking-connector/Dockerfile
    container_name: banking-connector
    depends_on:
      - transactions-service
      - vault
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      TRANSACTIONS_SERVICE_URL: "${BANKING_TRANSACTIONS_SERVICE_URL:-http://transactions-service/import}"
      VAULT_ADDR: "${BANKING_VAULT_ADDR:-http://vault:8200}"
      VAULT_TOKEN: "${VAULT_DEV_ROOT_TOKEN_ID}"
      BANKING_CONNECTIONS_STORE_PATH: "${BANKING_CONNECTIONS_STORE_PATH:-/data/banking_user_connections.json}"
      BANKING_SYNC_USAGE_PATH: "${BANKING_SYNC_USAGE_PATH:-/data/bank_sync_usage.json}"
      TRUELAYER_CLIENT_ID: "${TRUELAYER_CLIENT_ID:-}"
      TRUELAYER_CLIENT_SECRET: "${TRUELAYER_CLIENT_SECRET:-}"
      TRUELAYER_REDIRECT_URI: "${TRUELAYER_REDIRECT_URI:-http://localhost:3000/connect-bank/callback}"
      TRUELAYER_PRODUCTION: "${TRUELAYER_PRODUCTION:-0}"
      BANKING_OPEN_BANKING_PROVIDER: "${BANKING_OPEN_BANKING_PROVIDER:-saltedge}"
      BANKING_OAUTH_REDIRECT_URI: "${BANKING_OAUTH_REDIRECT_URI:-http://localhost:3000/connect-bank/callback}"
      SALTEDGE_BASE_URL: "${SALTEDGE_BASE_URL:-https://www.saltedge.com/api/v5}"
      SALTEDGE_APP_ID: "${SALTEDGE_APP_ID:-}"
      SALTEDGE_SECRET: "${SALTEDGE_SECRET:-}"
      SALTEDGE_CUSTOMER_PREFIX: "${SALTEDGE_CUSTOMER_PREFIX:-mynettax}"
      SALTEDGE_SCOPES: "${SALTEDGE_SCOPES:-accounts,transactions}"
    volumes:
      - banking_connections_data:/data
    networks:
      - default_network

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - default_network

  celery-worker:
    build:
      context: .
      dockerfile: services/banking-connector/Dockerfile
    container_name: celery-worker
    command: celery -A app.celery_app.celery worker --loglevel=info
    depends_on:
      - redis
      - transactions-service
    environment:
      # Pass the same environment variables as the web server
      TRANSACTIONS_SERVICE_URL: "${BANKING_TRANSACTIONS_SERVICE_URL:-http://transactions-service/import}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
    networks:
      - default_network

  celery-worker-docs:
    build:
      context: .
      dockerfile: services/documents-service/Dockerfile
    container_name: celery-worker-docs
    command: celery -A app.celery_app.celery worker --loglevel=info
    depends_on:
      - redis-master
      - postgres-master
      - minio
    environment:
      DATABASE_URL: "${DOCUMENTS_DATABASE_URL:-postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master/db_documents}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-internal-service-secret-dev-replace}"
      INTERNAL_SERVICE_ISSUER: "${INTERNAL_SERVICE_ISSUER:-documents-service}"
      INTERNAL_JWT_AUDIENCE: "${INTERNAL_JWT_AUDIENCE:-mynettax-internal}"
      AWS_ENDPOINT_URL: "${DOCUMENTS_AWS_ENDPOINT_URL:-http://minio:9000}"
      AWS_ACCESS_KEY_ID: "${DOCUMENTS_AWS_ACCESS_KEY_ID:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${DOCUMENTS_AWS_SECRET_ACCESS_KEY:-minioadmin}"
      AWS_DEFAULT_REGION: "${DOCUMENTS_AWS_DEFAULT_REGION:-eu-west-2}"
      AWS_TEXTRACT_ENDPOINT_URL: "${DOCUMENTS_AWS_TEXTRACT_ENDPOINT_URL:-http://localstack:4566}"
      S3_BUCKET_NAME: "${DOCUMENTS_S3_BUCKET_NAME:-documents-bucket}"
      QNA_SERVICE_URL: "${DOCUMENTS_QNA_SERVICE_URL:-http://qna-service/index}"
      CATEGORIZATION_SERVICE_URL: "${DOCUMENTS_CATEGORIZATION_SERVICE_URL:-http://categorization-service/categorize}"
      TRANSACTIONS_SERVICE_URL: "${DOCUMENTS_TRANSACTIONS_SERVICE_URL:-http://transactions-service/transactions/receipt-drafts}"
      OCR_PROVIDER: "${DOCUMENTS_OCR_PROVIDER:-textract}"
      OCR_TEXTRACT_API: "${DOCUMENTS_OCR_TEXTRACT_API:-detect}"
      OCR_REVIEW_CONFIDENCE_THRESHOLD: "${DOCUMENTS_OCR_REVIEW_CONFIDENCE_THRESHOLD:-0.75}"
    networks:
      - default_network

  localstack:
    profiles:
      - dev-localstack
    image: localstack/localstack:latest
    container_name: localstack
    environment:
      SERVICES: "${LOCALSTACK_SERVICES:-s3}"
      AWS_DEFAULT_REGION: "${DOCUMENTS_AWS_DEFAULT_REGION:-eu-west-2}"
      AWS_ACCESS_KEY_ID: "${DOCUMENTS_AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${DOCUMENTS_AWS_SECRET_ACCESS_KEY:-test}"
      LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: "1"
    networks:
      - default_network

  aws-cli-setup:
    profiles:
      - dev-localstack
    image: amazon/aws-cli:2.13.25
    container_name: aws-cli-setup
    depends_on:
      - localstack
    environment:
      AWS_ACCESS_KEY_ID: "${DOCUMENTS_AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${DOCUMENTS_AWS_SECRET_ACCESS_KEY:-test}"
      AWS_DEFAULT_REGION: "${DOCUMENTS_AWS_DEFAULT_REGION:-eu-west-2}"
    # This command runs once and creates the S3 bucket we need.
    command: >
      sh -c "
        aws s3 mb s3://${DOCUMENTS_S3_BUCKET_NAME:-documents-bucket} --endpoint-url ${DOCUMENTS_AWS_ENDPOINT_URL:-http://localstack:4566} &&
        echo 'Bucket created successfully.'
      "
    networks:
      - default_network

  documents-service:
    build:
      context: .
      dockerfile: services/documents-service/Dockerfile
    container_name: documents-service
    depends_on:
      - postgres-master
      - minio
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-internal-service-secret-dev-replace}"
      INTERNAL_SERVICE_ISSUER: "${INTERNAL_SERVICE_ISSUER:-documents-service}"
      INTERNAL_JWT_AUDIENCE: "${INTERNAL_JWT_AUDIENCE:-mynettax-internal}"
      DATABASE_URL: "${DOCUMENTS_DATABASE_URL:-postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master/db_documents}"
      AWS_ENDPOINT_URL: "${DOCUMENTS_AWS_ENDPOINT_URL:-http://minio:9000}"
      AWS_ACCESS_KEY_ID: "${DOCUMENTS_AWS_ACCESS_KEY_ID:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${DOCUMENTS_AWS_SECRET_ACCESS_KEY:-minioadmin}"
      AWS_DEFAULT_REGION: "${DOCUMENTS_AWS_DEFAULT_REGION:-eu-west-2}"
      AWS_TEXTRACT_ENDPOINT_URL: "${DOCUMENTS_AWS_TEXTRACT_ENDPOINT_URL:-http://localstack:4566}"
      S3_BUCKET_NAME: "${DOCUMENTS_S3_BUCKET_NAME:-documents-bucket}"
      CATEGORIZATION_SERVICE_URL: "${DOCUMENTS_CATEGORIZATION_SERVICE_URL:-http://categorization-service/categorize}"
      TRANSACTIONS_SERVICE_URL: "${DOCUMENTS_TRANSACTIONS_SERVICE_URL:-http://transactions-service/transactions/receipt-drafts}"
      OCR_PROVIDER: "${DOCUMENTS_OCR_PROVIDER:-textract}"
      OCR_TEXTRACT_API: "${DOCUMENTS_OCR_TEXTRACT_API:-detect}"
      OCR_REVIEW_CONFIDENCE_THRESHOLD: "${DOCUMENTS_OCR_REVIEW_CONFIDENCE_THRESHOLD:-0.75}"
    # No longer need local volume for uploads
    # volumes:
    #   - documents_data:/uploads
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 80"
    networks:
      - default_network

  tax-engine:
    build:
      context: .
      dockerfile: services/tax-engine/Dockerfile
    container_name: tax-engine
    depends_on:
      - transactions-service
      - integrations-service
      - calendar-service
      - regulatory-service
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      TRANSACTIONS_SERVICE_URL: "${TAX_TRANSACTIONS_SERVICE_URL:-http://transactions-service/transactions/me}"
      INTEGRATIONS_SERVICE_URL: "${TAX_INTEGRATIONS_SERVICE_URL:-http://integrations-service/integrations/hmrc/submit-tax-return}"
      MTD_QUARTERLY_INTEGRATIONS_SERVICE_URL: "${TAX_MTD_QUARTERLY_INTEGRATIONS_SERVICE_URL:-http://integrations-service/integrations/hmrc/mtd/quarterly-update}"
      CALENDAR_SERVICE_URL: "${TAX_CALENDAR_SERVICE_URL:-http://calendar-service/events}"
      REGULATORY_SERVICE_URL: "${REGULATORY_SERVICE_URL:-http://regulatory-service:8025}"
      TAX_MTD_ITSA_RULES_JSON: '${TAX_MTD_ITSA_RULES_JSON:-[{"policy_code":"UK_MTD_ITSA_2026","effective_from":"2026-04-06","threshold":50000,"reporting_cadence":"quarterly_updates_plus_final_declaration"},{"policy_code":"UK_MTD_ITSA_2027","effective_from":"2027-04-06","threshold":30000,"reporting_cadence":"quarterly_updates_plus_final_declaration"},{"policy_code":"UK_MTD_ITSA_2028","effective_from":"2028-04-06","threshold":20000,"reporting_cadence":"quarterly_updates_plus_final_declaration"}]}'
      OTEL_SERVICE_NAME: "${TAX_OTEL_SERVICE_NAME:-tax-engine}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${TAX_OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}"
    networks:
      - default_network

  advice-service:
    build:
      context: .
      dockerfile: services/advice-service/Dockerfile
    container_name: advice-service
    depends_on:
      - transactions-service
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      TRANSACTIONS_SERVICE_URL: "${ADVICE_TRANSACTIONS_SERVICE_URL:-http://transactions-service/transactions/me}"
    networks:
      - default_network

  partner-registry:
    build:
      context: .
      dockerfile: services/partner-registry/Dockerfile
    container_name: partner-registry
    depends_on:
      - compliance-service
      - postgres-master
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      DATABASE_URL: "${PARTNER_DATABASE_URL:-postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master/db_partner}"
      COMPLIANCE_SERVICE_URL: "${PARTNER_COMPLIANCE_SERVICE_URL:-http://compliance-service/audit-events}"
      AUTO_CREATE_SCHEMA: "${PARTNER_AUTO_CREATE_SCHEMA:-true}"
      BILLING_REPORT_ALLOWED_SCOPES: "${PARTNER_BILLING_REPORT_ALLOWED_SCOPES:-billing:read}"
      BILLING_REPORT_ALLOWED_ROLES: "${PARTNER_BILLING_REPORT_ALLOWED_ROLES:-admin,billing_admin}"
      BILLING_INVOICE_DUE_DAYS: "${PARTNER_BILLING_INVOICE_DUE_DAYS:-14}"
      SELF_EMPLOYED_INVOICE_DUE_DAYS: "${PARTNER_SELF_EMPLOYED_INVOICE_DUE_DAYS:-14}"
      SELF_EMPLOYED_PAYMENT_LINK_BASE_URL: "${PARTNER_SELF_EMPLOYED_PAYMENT_LINK_BASE_URL:-https://pay.mynettax.app/invoices}"
      SELF_EMPLOYED_PAYMENT_LINK_PROVIDER: "${PARTNER_SELF_EMPLOYED_PAYMENT_LINK_PROVIDER:-mynettax_payment_link}"
      SELF_EMPLOYED_REMINDER_DUE_SOON_DAYS: "${PARTNER_SELF_EMPLOYED_REMINDER_DUE_SOON_DAYS:-3}"
      SELF_EMPLOYED_REMINDER_EMAIL_ENABLED: "${PARTNER_SELF_EMPLOYED_REMINDER_EMAIL_ENABLED:-false}"
      SELF_EMPLOYED_REMINDER_SMS_ENABLED: "${PARTNER_SELF_EMPLOYED_REMINDER_SMS_ENABLED:-false}"
      SELF_EMPLOYED_REMINDER_EMAIL_PROVIDER: "${PARTNER_SELF_EMPLOYED_REMINDER_EMAIL_PROVIDER:-webhook}"
      SELF_EMPLOYED_REMINDER_SMS_PROVIDER: "${PARTNER_SELF_EMPLOYED_REMINDER_SMS_PROVIDER:-webhook}"
      SELF_EMPLOYED_REMINDER_EMAIL_DISPATCH_URL: "${PARTNER_SELF_EMPLOYED_REMINDER_EMAIL_DISPATCH_URL:-}"
      SELF_EMPLOYED_REMINDER_SMS_DISPATCH_URL: "${PARTNER_SELF_EMPLOYED_REMINDER_SMS_DISPATCH_URL:-}"
      SELF_EMPLOYED_REMINDER_EMAIL_FROM: "${PARTNER_SELF_EMPLOYED_REMINDER_EMAIL_FROM:-noreply@mynettax.app}"
      SELF_EMPLOYED_REMINDER_SMS_FROM: "${PARTNER_SELF_EMPLOYED_REMINDER_SMS_FROM:-MyNetTax}"
      SELF_EMPLOYED_SENDGRID_API_URL: "${PARTNER_SELF_EMPLOYED_SENDGRID_API_URL:-https://api.sendgrid.com/v3/mail/send}"
      SELF_EMPLOYED_SENDGRID_API_KEY: "${PARTNER_SELF_EMPLOYED_SENDGRID_API_KEY:-}"
      SELF_EMPLOYED_TWILIO_API_BASE_URL: "${PARTNER_SELF_EMPLOYED_TWILIO_API_BASE_URL:-https://api.twilio.com}"
      SELF_EMPLOYED_TWILIO_ACCOUNT_SID: "${PARTNER_SELF_EMPLOYED_TWILIO_ACCOUNT_SID:-}"
      SELF_EMPLOYED_TWILIO_AUTH_TOKEN: "${PARTNER_SELF_EMPLOYED_TWILIO_AUTH_TOKEN:-}"
      SELF_EMPLOYED_TWILIO_MESSAGING_SERVICE_SID: "${PARTNER_SELF_EMPLOYED_TWILIO_MESSAGING_SERVICE_SID:-}"
      SELF_EMPLOYED_REMINDER_DELIVERY_RETRY_ATTEMPTS: "${PARTNER_SELF_EMPLOYED_REMINDER_DELIVERY_RETRY_ATTEMPTS:-3}"
      SELF_EMPLOYED_REMINDER_DELIVERY_RETRY_BASE_DELAY_SECONDS: "${PARTNER_SELF_EMPLOYED_REMINDER_DELIVERY_RETRY_BASE_DELAY_SECONDS:-0.5}"
      SELF_EMPLOYED_REMINDER_DISPATCH_TIMEOUT_SECONDS: "${PARTNER_SELF_EMPLOYED_REMINDER_DISPATCH_TIMEOUT_SECONDS:-5}"
      PMF_GATE_REQUIRED_ACTIVATION_RATE_PERCENT: "${PMF_GATE_REQUIRED_ACTIVATION_RATE_PERCENT:-60}"
      PMF_GATE_REQUIRED_RETENTION_90D_PERCENT: "${PMF_GATE_REQUIRED_RETENTION_90D_PERCENT:-75}"
      PMF_GATE_REQUIRED_NPS_SCORE: "${PMF_GATE_REQUIRED_NPS_SCORE:-45}"
      PMF_GATE_MIN_ELIGIBLE_USERS_90D: "${PMF_GATE_MIN_ELIGIBLE_USERS_90D:-20}"
      PMF_GATE_MIN_NPS_RESPONSES: "${PMF_GATE_MIN_NPS_RESPONSES:-20}"
      SEED_GATE_REQUIRED_MRR_GBP: "${SEED_GATE_REQUIRED_MRR_GBP:-40000}"
      SEED_GATE_MAX_MONTHLY_CHURN_PERCENT: "${SEED_GATE_MAX_MONTHLY_CHURN_PERCENT:-3}"
      SEED_GATE_MIN_LTV_CAC_RATIO: "${SEED_GATE_MIN_LTV_CAC_RATIO:-4}"
    networks:
      - default_network

  integrations-service:
    build:
      context: .
      dockerfile: services/integrations-service/Dockerfile
    container_name: integrations-service
    environment:
      INTEGRATIONS_DB_PATH: "${INTEGRATIONS_DB_PATH:-/tmp/integrations.db}"
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      HMRC_DIRECT_API_BASE_URL: "${HMRC_DIRECT_API_BASE_URL:-https://api.service.hmrc.gov.uk}"
      HMRC_DIRECT_SUBMISSION_ENABLED: "${HMRC_DIRECT_SUBMISSION_ENABLED:-false}"
      HMRC_OAUTH_TOKEN_URL: "${HMRC_OAUTH_TOKEN_URL:-https://test-api.service.hmrc.gov.uk/oauth/token}"
      HMRC_OAUTH_CLIENT_ID: "${HMRC_OAUTH_CLIENT_ID:-}"
      HMRC_OAUTH_CLIENT_SECRET: "${HMRC_OAUTH_CLIENT_SECRET:-}"
      HMRC_OAUTH_SCOPE: "${HMRC_OAUTH_SCOPE:-write:self-assessment}"
      HMRC_QUARTERLY_ENDPOINT_PATH: "${HMRC_QUARTERLY_ENDPOINT_PATH:-/itsa/quarterly-updates}"
      HMRC_REQUEST_TIMEOUT_SECONDS: "${HMRC_REQUEST_TIMEOUT_SECONDS:-20}"
      HMRC_DIRECT_FALLBACK_TO_SIMULATION: "${HMRC_DIRECT_FALLBACK_TO_SIMULATION:-false}"
      HMRC_REQUIRE_EXPLICIT_CONFIRM: "${HMRC_REQUIRE_EXPLICIT_CONFIRM:-false}"
      POLICY_SPEC_VERSION: "${POLICY_SPEC_VERSION:-1.0}"
      HMRC_MTD_DRAFT_TTL_HOURS: "${HMRC_MTD_DRAFT_TTL_HOURS:-24}"
      HMRC_MTD_CONFIRM_TTL_MINUTES: "${HMRC_MTD_CONFIRM_TTL_MINUTES:-15}"
      HMRC_OAUTH_CREDENTIALS_ROTATED_AT: "${HMRC_OAUTH_CREDENTIALS_ROTATED_AT:-}"
      HMRC_OAUTH_ROTATION_MAX_AGE_DAYS: "${HMRC_OAUTH_ROTATION_MAX_AGE_DAYS:-90}"
      HMRC_SLO_WINDOW_SIZE: "${HMRC_SLO_WINDOW_SIZE:-200}"
      HMRC_SLO_SUCCESS_RATE_TARGET_PERCENT: "${HMRC_SLO_SUCCESS_RATE_TARGET_PERCENT:-99}"
      HMRC_SLO_P95_LATENCY_TARGET_MS: "${HMRC_SLO_P95_LATENCY_TARGET_MS:-2500}"
      COMPLIANCE_SERVICE_URL: "${INTEGRATIONS_COMPLIANCE_SERVICE_URL:-http://compliance-service:80}"
    depends_on:
      - compliance-service
    networks:
      - default_network

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: analytics-service
    depends_on:
      - transactions-service
      - documents-service
      - user-profile-service
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      TRANSACTIONS_SERVICE_URL: "${ANALYTICS_TRANSACTIONS_SERVICE_URL:-http://transactions-service/transactions/me}"
      DOCUMENTS_SERVICE_URL: "${ANALYTICS_DOCUMENTS_SERVICE_URL:-http://documents-service/documents}"
      USER_PROFILE_SERVICE_URL: "${ANALYTICS_USER_PROFILE_SERVICE_URL:-http://user-profile-service/profiles/me}"
      TAX_ENGINE_CALCULATE_URL: "${TAX_ENGINE_CALCULATE_URL:-http://tax-engine/calculate}"
    networks:
      - default_network

  agent-service:
    build:
      context: .
      dockerfile: services/agent-service/Dockerfile
    container_name: agent-service
    depends_on:
      - documents-service
      - transactions-service
      - tax-engine
      - redis
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      DOCUMENTS_REVIEW_QUEUE_URL: "${AGENT_DOCUMENTS_REVIEW_QUEUE_URL:-http://documents-service/documents/review-queue}"
      DOCUMENTS_REVIEW_UPDATE_URL_TEMPLATE: "${AGENT_DOCUMENTS_REVIEW_UPDATE_URL_TEMPLATE:-http://documents-service/documents/{document_id}/review}"
      TRANSACTIONS_RECEIPT_DRAFTS_URL: "${AGENT_TRANSACTIONS_RECEIPT_DRAFTS_URL:-http://transactions-service/transactions/receipt-drafts/unmatched}"
      TRANSACTIONS_RECONCILE_URL_TEMPLATE: "${AGENT_TRANSACTIONS_RECONCILE_URL_TEMPLATE:-http://transactions-service/transactions/receipt-drafts/{draft_transaction_id}/reconcile}"
      TRANSACTIONS_IGNORE_URL_TEMPLATE: "${AGENT_TRANSACTIONS_IGNORE_URL_TEMPLATE:-http://transactions-service/transactions/receipt-drafts/{draft_transaction_id}/ignore}"
      TRANSACTIONS_ME_URL: "${AGENT_TRANSACTIONS_ME_URL:-http://transactions-service/transactions/me}"
      TAX_ENGINE_CALCULATE_URL: "${AGENT_TAX_ENGINE_CALCULATE_URL:-http://tax-engine/calculate}"
      TAX_CALCULATE_AND_SUBMIT_URL: "${AGENT_TAX_ENGINE_CALCULATE_AND_SUBMIT_URL:-http://tax-engine/calculate-and-submit}"
      AGENT_DEFAULT_TAX_LOOKBACK_DAYS: "${AGENT_DEFAULT_TAX_LOOKBACK_DAYS:-365}"
      AGENT_REDIS_URL: "${AGENT_REDIS_URL:-redis://redis:6379/0}"
      AGENT_SESSION_TTL_SECONDS: "${AGENT_SESSION_TTL_SECONDS:-86400}"
      AGENT_CONFIRMATION_TOKEN_TTL_SECONDS: "${AGENT_CONFIRMATION_TOKEN_TTL_SECONDS:-900}"
      AGENT_AUDIT_MAX_EVENTS: "${AGENT_AUDIT_MAX_EVENTS:-500}"
      AGENT_AUDIT_TTL_SECONDS: "${AGENT_AUDIT_TTL_SECONDS:-604800}"
      AGENT_UNTRUSTED_TEXT_MAX_LENGTH: "${AGENT_UNTRUSTED_TEXT_MAX_LENGTH:-300}"
      AGENT_WRITE_ACTIONS_ENABLED: "${AGENT_WRITE_ACTIONS_ENABLED:-true}"
    networks:
      - default_network

  localization-service:
    build: ./services/localization-service
    container_name: localization-service
    environment:
      LOCALIZATION_CATALOG_DIR: "${LOCALIZATION_CATALOG_DIR:-/code/catalogs}"
    networks:
      - default_network

  categorization-service:
    build: ./services/categorization-service
    container_name: categorization-service
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      CATEGORIZATION_LEARNED_RULES_PATH: "/data/learned_rules.json"
      CATEGORIZATION_MERCHANT_RULES_PATH: "/data/merchant_rules.json"
      CATEGORIZATION_INTERNAL_TOKEN: "${CATEGORIZATION_INTERNAL_TOKEN:-}"
    volumes:
      - categorization_learned_data:/data
    networks:
      - default_network

  prometheus:
    image: prom/prometheus:v2.47.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - default_network

  support-ai-service:
    build: ./services/support-ai-service
    container_name: support-ai-service
    ports:
      - "8020:8020"
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      AUTH_SERVICE_URL: "http://auth-service:80"
      SUPPORT_DB_PATH: "/data/support.db"
    volumes:
      - support_data:/data
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  qna-service:
    build:
      context: .
      dockerfile: services/qna-service/Dockerfile
    container_name: qna-service
    depends_on:
      - weaviate
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      WEAVIATE_URL: "${QNA_WEAVIATE_URL:-http://weaviate:8080}"
    networks:
      - default_network

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_DEV_ROOT_TOKEN_ID}"
      VAULT_DEV_LISTEN_ADDRESS: "${VAULT_DEV_LISTEN_ADDRESS:-0.0.0.0:8200}"
    cap_add:
      - IPC_LOCK
    command: "server -dev"
    networks:
      - default_network

  grafana:
    image: grafana/grafana:10.1.5
    container_name: grafana
    ports:
      - "3001:3000" # Changed to 3001 to avoid conflict with web-portal
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    networks:
      - default_network

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - default_network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers # Access to Docker container logs
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - default_network

  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - default_network

  calendar-service:
    build: ./services/calendar-service
    container_name: calendar-service
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
    networks:
      - default_network

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.23.7
    container_name: weaviate
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none" # We will generate vectors ourselves
      CLUSTER_HOSTNAME: "node1"
    networks:
      - default_network

  # Security Service (Advanced Security Hardening)
  security-service:
    build: ./services/security-service
    container_name: security-service
    ports:
      - "8018:8018"
    environment:
      NODE_ENV: "development"
      SECURITY_SERVICE_PORT: "8018"
      SECURITY_DATABASE_URL: "postgresql://user:${POSTGRES_PASSWORD:-password}@postgres-master:5432/db_user_profile"
      SECURITY_REDIS_URL: "redis://redis:6379/3"
      JWT_SECRET_KEY: "${SECURITY_JWT_SECRET_KEY:-${AUTH_SECRET_KEY}}"
      SESSION_SECRET: "${SECURITY_SESSION_SECRET:-${AUTH_SECRET_KEY}}"
      MFA_ISSUER: "MyNetTax"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
      PROMETHEUS_ENABLED: "true"
    depends_on:
      - postgres-master
      - redis
    networks:
      - default_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8018/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # SIEM and Log Management
  elasticsearch:
    profiles:
      - siem
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - default_network
    restart: unless-stopped

  kibana:
    profiles:
      - siem
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - default_network
    restart: unless-stopped

  # Web Application Firewall (Security Layer)
  security-proxy:
    image: nginx:alpine
    container_name: security-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./security/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./security/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./security/ssl:/etc/nginx/ssl:ro
      - security_logs:/var/log/nginx
    depends_on:
      - nginx-gateway
      - security-service
    networks:
      - default_network
    restart: unless-stopped

  # Backup Service for automated backups
  backup-service:
    build: ./infra/backup
    container_name: backup_service
    environment:
      POSTGRES_HOST: postgres-master
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-db_user_profile}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      BACKUP_SCHEDULE: "0 2 * * *" # Daily at 2 AM
      BACKUP_RETENTION_DAYS: 30
      BACKUP_ENCRYPTION_KEY: "${BACKUP_ENCRYPTION_KEY}"
      S3_BUCKET: "${S3_BUCKET:-mynettax-backups}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      S3_SECRET_KEY: "${S3_SECRET_KEY}"
      BACKUP_WEBHOOK_URL: "${BACKUP_WEBHOOK_URL}"
    volumes:
      - backup_data:/backups
    depends_on:
      - postgres-master
      - redis-master
    networks:
      - default_network
    restart: unless-stopped

  finops-monitor:
    build:
      context: .
      dockerfile: services/finops-monitor/Dockerfile
    container_name: finops-monitor
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      INTERNAL_SERVICE_SECRET: "${INTERNAL_SERVICE_SECRET:-internal-service-secret-dev-replace}"
      AUTH_SERVICE_INTERNAL_URL: "${FINOPS_AUTH_SERVICE_INTERNAL_URL:-http://auth-service:80}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      REDIS_URL: "${FINOPS_REDIS_URL:-redis://redis-master:6379/0}"
      FRAUD_SERVICE_URL: "http://fraud-detection:80"
      TRANSACTIONS_SERVICE_URL: "http://transactions-service:80"
      INVOICE_SERVICE_URL: "http://invoice-service:80"
      LOW_BALANCE_THRESHOLD: "500"
      INVOICE_WARNING_DAYS: "7"
    ports:
      - "8021:8021"
    depends_on:
      - redis-master
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8021/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  mtd-agent:
    build:
      context: .
      dockerfile: services/mtd-agent/Dockerfile
    container_name: mtd-agent
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      REDIS_URL: "${MTD_REDIS_URL:-redis://redis-master:6379/0}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      HMRC_BASE_URL: "${HMRC_BASE_URL:-https://test-api.service.hmrc.gov.uk}"
      HMRC_CLIENT_ID: "${HMRC_CLIENT_ID:-}"
      HMRC_CLIENT_SECRET: "${HMRC_CLIENT_SECRET:-}"
      TAX_ENGINE_URL: "${TAX_ENGINE_SERVICE_URL:-http://tax-engine:80}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}"
    ports:
      - "8022:8022"
    depends_on:
      - redis-master
      - tax-engine
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8022/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  voice-gateway:
    build: ./services/voice-gateway
    container_name: voice-gateway
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      VOICE_GATEWAY_ENFORCE_JWT: "${VOICE_GATEWAY_ENFORCE_JWT:-0}"
      AGENT_SERVICE_URL: "http://ai-agent-service:80"
      MTD_AGENT_URL: "http://mtd-agent:8022"
      WHISPER_MODEL: "whisper-1"
      WHISPER_LANGUAGE: "en"
      TTS_MODEL: "tts-1"
      TTS_VOICE: "nova"
    ports:
      - "8023:8023"
    depends_on:
      - mtd-agent
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8023/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  billing-service:
    build: ./services/billing-service
    container_name: billing-service
    depends_on:
      - auth-service
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      COMPLIANCE_SERVICE_URL: "${BILLING_COMPLIANCE_SERVICE_URL:-http://compliance-service:80}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_STARTER: "${STRIPE_PRICE_STARTER:-}"
      STRIPE_PRICE_GROWTH: "${STRIPE_PRICE_GROWTH:-}"
      STRIPE_PRICE_PRO: "${STRIPE_PRICE_PRO:-}"
      STRIPE_PRICE_BUSINESS: "${STRIPE_PRICE_BUSINESS:-}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      AUTH_SERVICE_URL: "http://auth-service:80"
    ports:
      - "8024:80"
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  referral-service:
    build: ./services/referral-service
    container_name: referral-service
    depends_on:
      - postgres-master
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      DATABASE_URL: "postgresql+asyncpg://user:${POSTGRES_PASSWORD:-password}@postgres-master:5432/db_referral"
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  cost-optimization:
    build: ./services/cost-optimization
    container_name: cost-optimization
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  orchestrator-service:
    build: ./services/orchestrator-service
    container_name: orchestrator-service
    environment:
      AUTH_SECRET_KEY: "${AUTH_SECRET_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      REDIS_URL: "redis://redis:6379/9"
      TAX_ENGINE_URL: "http://tax-engine:80"
      TRANSACTIONS_SERVICE_URL: "http://transactions-service:80"
      DOCUMENTS_SERVICE_URL: "http://documents-service:80"
      INTEGRATIONS_SERVICE_URL: "http://integrations-service:80"
      SUPPORT_AI_SERVICE_URL: "http://support-ai-service:8020"
      ADVICE_SERVICE_URL: "http://advice-service:80"
      INVOICE_SERVICE_URL: "http://invoice-service:80"
      CATEGORIZATION_SERVICE_URL: "http://categorization-service:80"
      ORCHESTRATOR_MODEL: "gpt-4o"
      AGENT_TIMEOUT_SECONDS: "25"
    depends_on:
      - redis
      - tax-engine
      - transactions-service
      - documents-service
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  regulatory-service:
    build:
      context: .
      dockerfile: services/regulatory-service/Dockerfile
    container_name: regulatory-service
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "8025:8025"
    networks:
      - default_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8025/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  # High Availability Database Volumes
  postgres_master_data:
  postgres_replica_data:
  redis_master_data:
  redis_replica1_data:
  redis_replica2_data:
  backup_data:
  # Invoice service volumes
  invoice_pdfs:
  banking_connections_data:
  # Legacy and other volumes
  postgres_data:
  minio_data:
  redis_data:
  mlflow_artifacts:
  elasticsearch_data:
  security_logs:
  support_data:
  auth_service_data:
  categorization_learned_data:

networks:
  default_network:
    driver: bridge

# Merge after docker-compose.prod.yml so internal services are not bound to the host.
# Example:
#   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.prod.lockdown.yml up -d
# Only security-proxy should publish 80/443; reach nginx-gateway via the Docker network (security-proxy → nginx-gateway).

services:
  graphql-gateway:
    ports: []
  nginx-gateway:
    ports: []
  postgres-replica:
    ports: []
  minio:
    ports: []
  redis-replica-1:
